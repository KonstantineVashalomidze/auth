spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  application:
    name: auth
    customConfigs:
      constants:
        otpTimeToLiveSeconds: 300 # 5 mins
        applicationEmail: vashalomidzekonstantine@gmail.com
        otpMaxAttempts: 5
        refreshTokenExpirationSeconds: 2592000 # 30 days
        accessTokenExpirationSeconds: 900 # 15 mins

jwt:
  secret: ${JWT_SECRET}